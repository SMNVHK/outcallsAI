services:
  caddy:
    image: caddy:2-alpine
    container_name: outcallsai-caddy
    network_mode: host
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-localhost}
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  asterisk:
    build: ./asterisk
    container_name: outcallsai-asterisk
    network_mode: host
    environment:
      - DIDWW_SIP_USERNAME=${DIDWW_SIP_USERNAME}
      - DIDWW_SIP_PASSWORD=${DIDWW_SIP_PASSWORD}
      - DIDWW_SIP_HOST=${DIDWW_SIP_HOST}
      - ASTERISK_ARI_PASSWORD=${ASTERISK_ARI_PASSWORD}
      - OUTCALLS_CALLER_ID=${OUTCALLS_CALLER_ID}
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: outcallsai-backend
    network_mode: host
    env_file:
      - ./backend/.env
    depends_on:
      - asterisk
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: outcallsai-frontend
    network_mode: host
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
