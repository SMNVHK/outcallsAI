services:
  # caddy: désactivé — Traefik gère déjà le port 443 sur ce VPS
  # Sera remplacé par un reverse proxy propre à l'étape hébergement

  asterisk:
    build: ./asterisk
    container_name: recovia-asterisk
    network_mode: host
    environment:
      - DIDWW_SIP_USERNAME=${DIDWW_SIP_USERNAME}
      - DIDWW_SIP_PASSWORD=${DIDWW_SIP_PASSWORD}
      - DIDWW_SIP_HOST=${DIDWW_SIP_HOST}
      - ASTERISK_ARI_PASSWORD=${ASTERISK_ARI_PASSWORD}
      - OUTCALLS_CALLER_ID=${OUTCALLS_CALLER_ID}
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: recovia-backend
    network_mode: host
    env_file:
      - ./backend/.env
    depends_on:
      - asterisk
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: recovia-frontend
    network_mode: host
    depends_on:
      - backend
    restart: unless-stopped

