services:
  asterisk:
    build: ./asterisk
    container_name: recovia-asterisk
    network_mode: host
    environment:
      - DIDWW_SIP_USERNAME=${DIDWW_SIP_USERNAME}
      - DIDWW_SIP_PASSWORD=${DIDWW_SIP_PASSWORD}
      - DIDWW_SIP_HOST=${DIDWW_SIP_HOST}
      - ASTERISK_ARI_PASSWORD=${ASTERISK_ARI_PASSWORD}
      - OUTCALLS_CALLER_ID=${OUTCALLS_CALLER_ID}
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: recovia-backend
    network_mode: host
    env_file:
      - ./backend/.env
    depends_on:
      - asterisk
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.recovia-api.rule=Host(`api-recovia.amplify-belgium.com`)"
      - "traefik.http.routers.recovia-api.entrypoints=websecure"
      - "traefik.http.routers.recovia-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.recovia-api.loadbalancer.server.port=8000"
      # Security headers
      - "traefik.http.middlewares.recovia-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.recovia-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.recovia-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.recovia-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.recovia-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.recovia-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.recovia-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.routers.recovia-api.middlewares=recovia-headers"
