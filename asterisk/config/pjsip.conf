; === DIDWW Outbound Trunk (Amsterdam) ===

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

[didww-trunk]
type=registration
outbound_auth=didww-auth
server_uri=sip:DIDWW_SIP_HOST
client_uri=sip:DIDWW_USERNAME@DIDWW_SIP_HOST
retry_interval=60

[didww-auth]
type=auth
auth_type=userpass
username=DIDWW_USERNAME
password=DIDWW_PASSWORD

[didww-aor]
type=aor
contact=sip:DIDWW_SIP_HOST
qualify_frequency=60

[didww-endpoint]
type=endpoint
transport=transport-udp
context=from-didww
disallow=all
allow=ulaw
allow=alaw
outbound_auth=didww-auth
aors=didww-aor
from_domain=DIDWW_SIP_HOST
from_user=OUTCALLS_CALLER_ID
direct_media=no
rtp_symmetric=yes
