[general]
static=yes
writeprotect=no

[from-didww]
; Appels entrants depuis DIDWW (pas utilisé pour l'outbound mais requis)
exten => _X.,1,NoOp(Incoming call from DIDWW: ${EXTEN})
 same => n,Hangup()

[outcallsai-outbound]
; Contexte utilisé par ARI pour les appels sortants via DIDWW
exten => _X.,1,NoOp(Outbound call to ${EXTEN} via DIDWW)
 same => n,Dial(PJSIP/${EXTEN}@didww-endpoint,,)
 same => n,Hangup()
